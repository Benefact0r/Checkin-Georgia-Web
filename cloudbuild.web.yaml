# Build the web image with NEXT_PUBLIC_* baked in (Next inlines them at build).
# Submit:
#   gcloud builds submit --project=checkin-georgia-dev --config=cloudbuild.web.yaml \
#     --substitutions=_IMAGE=<img>,_API_URL=<url>,_FB_API_KEY=<k>,_FB_AUTH_DOMAIN=<d>,_FB_PROJECT_ID=<p>,_FB_APP_ID=<a> .
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=NEXT_PUBLIC_API_URL=${_API_URL}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_AUTH_DOMAIN}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT_ID}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID}'
      - '-t=${_IMAGE}'
      - '.'
images:
  - '${_IMAGE}'
options:
  logging: CLOUD_LOGGING_ONLY
