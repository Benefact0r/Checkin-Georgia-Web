# Build the web image (NEXT_PUBLIC_* inlined at build time) and deploy to Cloud
# Run with a safe (gated) rollout. Used by the Cloud Build GitHub trigger.
#
# Safe-deploy pattern: deploy the new revision with --no-traffic + --tag=candidate
# (0% traffic), smoke-test the candidate URL, and promote to 100% ONLY if it
# returns 200; otherwise fail the build and leave traffic on the last good revision.
#
# Built-in substitutions ($PROJECT_ID, $SHORT_SHA) are used directly in args.
# In the bash verify step, shell vars are escaped as $$ so Cloud Build does not
# treat them as substitutions; $PROJECT_ID stays a single $ (built-in).
# The NEXT_PUBLIC_* values are public client config (shipped in the JS bundle) —
# safe to commit. Override via trigger substitutions if the project changes.
substitutions:
  _API_URL: https://checkin-georgia-api-171625154738.europe-west1.run.app
  _FB_API_KEY: AIzaSyCBz59KC92v99SvnDcHfpHdMwusTENN-7E
  _FB_AUTH_DOMAIN: checkin-georgia-dev.firebaseapp.com
  _FB_PROJECT_ID: checkin-georgia-dev
  _FB_APP_ID: '1:171625154738:web:b9df530f86b13e768061ab'
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_API_URL=${_API_URL}
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID}
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/checkin/web:$SHORT_SHA
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west1-docker.pkg.dev/$PROJECT_ID/checkin/web:$SHORT_SHA
  - id: deploy-no-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - checkin-georgia-web
      - --project=$PROJECT_ID
      - --region=europe-west1
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/checkin/web:$SHORT_SHA
      - --update-env-vars=GIT_SHA=$SHORT_SHA
      - --min-instances=0
      - --max-instances=2
      - --no-traffic
      - --tag=candidate
      - --quiet
  - id: verify-and-promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -uo pipefail
        # The --tag=candidate revision is reachable at a deterministic tag URL:
        # https://candidate---<base-service-host>. (describe takes no --filter.)
        BASE=$$(gcloud run services describe checkin-georgia-web \
          --project=$PROJECT_ID --region=europe-west1 \
          --format="value(status.url)")
        if [ -z "$$BASE" ]; then echo "ERROR: no base service URL found"; exit 1; fi
        URL="https://candidate---$${BASE#https://}"
        echo "Candidate revision URL: $$URL"
        for i in $$(seq 1 24); do
          CODE=$$(curl -s -o /tmp/body -w '%{http_code}' "$$URL/" || true)
          echo "attempt $$i: HTTP $$CODE"
          if [ "$$CODE" = "200" ]; then
            echo "Home OK — promoting candidate to 100% traffic."
            gcloud run services update-traffic checkin-georgia-web \
              --project=$PROJECT_ID --region=europe-west1 --to-latest --quiet
            echo "Promoted."; exit 0
          fi
          sleep 5
        done
        echo "Health check FAILED after retries — traffic stays on the previous good revision."
        exit 1
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/checkin/web:$SHORT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
